query ListPublicMovieLists @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  movieLists(where: {isPublic: {eq: true}}, orderBy: [{createdAt: DESC}]) {
    id
    name
    description
    user {
      displayName
    }
  }
}

query GetMyMovieLists @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  movieLists(where: {userId: {eq_expr: "auth.uid"}}, orderBy: [{updatedAt: DESC}]) {
    id
    name
    isPublic
    description
    movieListEntries {
      position
      movie {
        title
        year
      }
    }
  }
}

mutation CreateMovieWatch($movieId: UUID!, $watchDate: Date!, $location: String, $notes: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  watch_insert(data: {
    userId_expr: "auth.uid",
    movieId: $movieId,
    watchDate: $watchDate,
    location: $location,
    notes: $notes
  })
}

mutation UpdateUserProfile($displayName: String, $bio: String, $photoUrl: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  user_update(key: {id_expr: "auth.uid"}, data: {
    displayName: $displayName,
    bio: $bio,
    photoUrl: $photoUrl
  })
}